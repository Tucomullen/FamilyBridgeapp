name: Mobile CI (Senior App)

on:
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: senior-app/package.json

      - name: Install deps
        working-directory: senior-app
        run: |
          npm ci || npm install

      - name: Type check (tsc)
        working-directory: senior-app
        run: |
          npx tsc --noEmit

      - name: Run tests (jest)
        working-directory: senior-app
        run: |
          npm test --silent -- --ci


