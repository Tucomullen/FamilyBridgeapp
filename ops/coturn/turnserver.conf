# FamilyBridge TURN Server Configuration
# DEV ONLY - DO NOT USE IN PRODUCTION

# Listening ports
listening-port=3478
tls-listening-port=5349

# External IP (auto-detect)
external-ip=auto-detect

# Relay ports range
min-port=49152
max-port=65535

# Authentication (DEV ONLY)
user=test:testpass
realm=familybridge.local

# Logging
log-file=stdout
verbose

# Security (DEV ONLY - relaxed)
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1
no-tlsv1_2

# Allow all (DEV ONLY)
denied-peer-ip=0.0.0.0-0.255.255.255
allowed-peer-ip=0.0.0.0-255.255.255.255

# No authentication for localhost (DEV ONLY)
no-auth
